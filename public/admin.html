<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#111111">
  <title>Admin — Rate Card by DG Network</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f4f4; color: #111; min-height: 100vh; }
    body.loading { visibility: hidden; }
    nav { background: #111; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; position: sticky; top: 0; z-index: 10; }
    .logo { display: flex; align-items: center; height: 34px; }
    .logo img { height: 34px; width: auto; display: block; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-user  { font-size: 14px; color: #aaa; max-width: 46vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-link { font-size: 14px; color: #fff; background: transparent; border: 1px solid #444; border-radius: 6px; padding: 5px 12px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; }
    .btn-link:hover { border-color: #aaa; color: #fff; }
    .btn-signout { font-size: 14px; color: #ccc; background: transparent; border: 1px solid #444; border-radius: 6px; padding: 5px 12px; cursor: pointer; }
    .btn-signout:hover { border-color: #aaa; color: #fff; }
    .page { max-width: 1400px; margin: 0 auto; padding: 28px clamp(14px, 2.4vw, 28px) 60px; }
    .page-hdr { margin-bottom: 18px; }
    .page-hdr h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 4px; }
    .page-hdr p  { font-size: 15px; color: #888; }
    .sec { margin-bottom: 18px; }
    .sec-label { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #e4e4e4; }
    .rule-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 14px 16px; }
    .rule-card .rc-title { font-size: 14px; font-weight: 600; color: #111; margin-bottom: 7px; }
    .rule-card .rc-body  { font-size: 13px; color: #777; line-height: 1.7; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:10px; }
    input[type=email] { flex:1; min-width:220px; padding:9px 10px; border:1px solid #ddd; border-radius:8px; font-size:16px; color:#111; background:#fff; outline:none; }
    input[type=email]:focus { border-color: #CC0000; }
    .btn-invite { font-size: 14px; color: #CC0000; background: transparent; border: 1px solid #CC0000; border-radius: 6px; padding: 5px 12px; cursor: pointer; }
    .btn-invite:hover { background: rgba(204,0,0,0.06); }
    .btn-copy { font-size: 14px; color: #185FA5; background: transparent; border: 1px solid #185FA5; border-radius: 6px; padding: 5px 10px; cursor: pointer; }
    .btn-copy:hover { background: rgba(24,95,165,0.08); }
    .btn-del { font-size: 14px; color: #fff; background: #111; border: 1px solid #111; border-radius: 6px; padding: 5px 10px; cursor: pointer; }
    .btn-del:hover { background: #000; border-color: #000; }
    .btn-del:disabled { opacity: 0.55; cursor: not-allowed; }
    .msg { margin-top:10px; font-size:14px; color:#777; }
    .tbl-wrap { overflow-x: auto; }
    .tbl { width: 100%; min-width: 820px; border-collapse: collapse; font-size: 14px; background:#fff; border:1px solid #e8e8e8; border-radius:10px; overflow:hidden; }
    .tbl th { text-align:center; padding: 10px 8px; color:#888; font-weight:600; background:#fafafa; border-bottom: 1px solid #eee; white-space: nowrap; }
    .tbl td { text-align:center; padding: 10px 8px; border-bottom: 1px solid #f1f1f1; white-space: nowrap; }
    .tbl td:first-child, .tbl th:first-child { text-align:left; }

    @media (max-width: 768px) {
      nav { padding: 10px 12px; height: auto; flex-wrap: wrap; gap: 10px; }
      .logo img { height: 30px; }
      .nav-right { width: 100%; justify-content: space-between; gap: 10px; }
      .page { padding: 18px 12px 56px; }
      .row { gap: 8px; }
      input[type=email] { width: 100%; font-size: 16px; }
      .btn-invite, .btn-del, .btn-link, .btn-signout { padding: 10px 12px; }
      .tbl-wrap { -webkit-overflow-scrolling: touch; }
    }
  </style>
</head>
<body class="loading">
  <nav>
    <div class="logo">
      <img src="/assets/dg-network-logo.png" alt="DG Network">
    </div>
    <div class="nav-right">
      <span class="nav-user" id="navUser"></span>
      <a class="btn-link" href="tool.html">Tool</a>
      <button class="btn-signout" id="btnSignOut">Sign out</button>
    </div>
  </nav>

  <div class="page">
    <div class="page-hdr">
      <h1>Admin</h1>
      <p>User management for Rate Card by DG Network</p>
    </div>

    <div class="sec">
      <div class="sec-label">Invite User</div>
      <div class="rule-card">
        <div class="rc-title">Send invite email</div>
        <div class="rc-body">
          Enter an email address and an invite will be sent (password reset email).
          <div class="row">
            <input id="inviteEmail" type="email" placeholder="user@company.com" autocomplete="email">
            <button class="btn-invite" id="btnInvite">Send invite</button>
          </div>
          <div class="msg" id="adminMsg"></div>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-label">Access Control</div>
      <div class="rule-card">
        <div class="rc-title">Allowed domains</div>
        <div class="rc-body">
          Users can access the tool if their email domain matches one of these domains.
          <div class="row">
            <input id="domainInput" type="text" placeholder="company.com" autocomplete="off">
            <button class="btn-invite" id="btnAddDomain">Add domain</button>
          </div>
          <div class="msg" id="domainsMsg"></div>
          <div class="tbl-wrap" style="margin-top:10px;">
            <table class="tbl" id="domainsTable"></table>
          </div>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-label">Pending Invites</div>
      <div class="tbl-wrap">
        <table class="tbl" id="invitesTable"></table>
      </div>
      <div class="msg" id="invitesMsg"></div>
    </div>

    <div class="sec">
      <div class="sec-label">Users</div>
      <div class="tbl-wrap">
        <table class="tbl" id="usersTable"></table>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const ADMIN_EMAILS = new Set(["mike@vevivo.com", "tony@dgnetwork.eu"]);
    const ADMIN_API_BASE = "https://us-central1-rate-card-by-dgnetwork.cloudfunctions.net/adminApi";
    const PUBLIC_API_BASE = "https://us-central1-rate-card-by-dgnetwork.cloudfunctions.net/publicApi";

    const usersTable = document.getElementById("usersTable");
    const invitesTable = document.getElementById("invitesTable");
    const inviteEmail = document.getElementById("inviteEmail");
    const btnInvite = document.getElementById("btnInvite");
    const adminMsg = document.getElementById("adminMsg");
    const invitesMsg = document.getElementById("invitesMsg");
    const domainsTable = document.getElementById("domainsTable");
    const domainInput = document.getElementById("domainInput");
    const btnAddDomain = document.getElementById("btnAddDomain");
    const domainsMsg = document.getElementById("domainsMsg");

    function setMsg(msg, isError) {
      adminMsg.textContent = msg || "";
      adminMsg.style.color = isError ? "#cc0000" : "#777";
    }

    function setInvitesMsg(msg, isError) {
      invitesMsg.textContent = msg || "";
      invitesMsg.style.color = isError ? "#cc0000" : "#777";
    }

    function userDomain(email) {
      const e = String(email || "").trim().toLowerCase();
      const at = e.lastIndexOf("@");
      if (at < 0) return null;
      return e.slice(at + 1);
    }

    async function fetchAllowedDomains() {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 15000);
      try {
        const res = await fetch(`${PUBLIC_API_BASE}/allowed-domains`, { method: "GET", signal: controller.signal });
        const text = await res.text();
        let json = null;
        try { json = text ? JSON.parse(text) : null; } catch (_) {}
        if (!res.ok) throw new Error((json && (json.message || json.error) ? (json.message || json.error) : text) || `HTTP ${res.status}`);
        const domains = json && Array.isArray(json.domains) ? json.domains : [];
        return { ok: true, domains: domains.map(d => String(d || "").trim().toLowerCase()).filter(Boolean) };
      } finally {
        clearTimeout(timeoutId);
      }
    }

    function isAllowed(userEmail, allowedEmails, allowedDomains) {
      const email = String(userEmail || "").trim().toLowerCase();
      if (ADMIN_EMAILS.has(email)) return true;
      const domain = userDomain(email);
      if (!allowedEmails.length && !allowedDomains.length) return true;
      if (allowedEmails.includes(email)) return true;
      if (domain && allowedDomains.includes(domain)) return true;
      return false;
    }

    function setDomainsMsg(msg, isError) {
      domainsMsg.textContent = msg || "";
      domainsMsg.style.color = isError ? "#cc0000" : "#777";
    }

    async function api(path, options) {
      const token = await auth.currentUser.getIdToken();
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 20000);
      const res = await fetch(`${ADMIN_API_BASE}${path}`, {
        ...(options || {}),
        signal: controller.signal,
        headers: {
          ...(options && options.headers ? options.headers : {}),
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
        },
      }).finally(() => clearTimeout(timeoutId));
      const text = await res.text();
      let json = null;
      try { json = text ? JSON.parse(text) : null; } catch (_) {}
      if (!res.ok) {
        const detail = json && (json.message || json.error || json.detail) ? (json.message || json.error || json.detail) : (text || `HTTP ${res.status}`);
        const msg = typeof detail === "string" ? detail : JSON.stringify(detail);
        throw new Error(msg);
      }
      return json;
    }

    function renderUsers(users) {
      const hdr = `<thead><tr><th>Email</th><th>Role</th><th>Verified</th><th>Disabled</th><th>Created</th><th>Last sign-in</th><th>Actions</th></tr></thead>`;
      const rows = (users || []).map(u => {
        const email = u.email || "(no email)";
        const role = u.role || "user";
        const ver = u.emailVerified ? "Yes" : "No";
        const dis = u.disabled ? "Yes" : "No";
        const created = u.createdAt ? new Date(u.createdAt).toLocaleString() : "—";
        const last = u.lastSignInAt ? new Date(u.lastSignInAt).toLocaleString() : "—";
        const uid = u.uid || "";
        const safeEmail = String(email).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const safeRole = String(role).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        return `<tr><td style="font-weight:600; color:#666; background:#fafafa;">${safeEmail}</td><td>${safeRole}</td><td>${ver}</td><td>${dis}</td><td>${created}</td><td>${last}</td><td>${uid ? `<button class="btn-del" data-uid="${uid}">Delete</button>` : "—"}</td></tr>`;
      }).join("");
      usersTable.innerHTML = `${hdr}<tbody>${rows}</tbody>`;
    }

    function renderInvites(invites) {
      const hdr = `<thead><tr><th>Email</th><th>Invited</th><th>Invited by</th><th>Created</th><th>Actions</th></tr></thead>`;
      const rows = (invites || []).map(i => {
        const email = i.email || "";
        const emailLabel = email || "(no email)";
        const invitedAt = i.invitedAt ? new Date(i.invitedAt).toLocaleString() : "—";
        const invitedBy = i.invitedBy || "—";
        const created = i.createdAt ? new Date(i.createdAt).toLocaleString() : "—";
        const safeEmail = String(emailLabel).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const emailAttr = encodeURIComponent(String(email));
        return `<tr><td style="font-weight:600; color:#666; background:#fafafa;">${safeEmail}</td><td>${invitedAt}</td><td>${invitedBy}</td><td>${created}</td><td>${email ? `<button class="btn-copy" data-invite-email="${emailAttr}">Copy invite link</button>` : "—"}</td></tr>`;
      }).join("");
      invitesTable.innerHTML = `${hdr}<tbody>${rows}</tbody>`;
    }

    function renderDomains(domains) {
      const hdr = `<thead><tr><th>Domain</th><th>Actions</th></tr></thead>`;
      const rows = (domains || []).map(d => {
        const domain = String(d || "").trim();
        const safe = domain.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const encoded = encodeURIComponent(domain);
        return `<tr><td style="font-weight:600; color:#666; background:#fafafa;">${safe}</td><td>${domain ? `<button class="btn-del" data-domain="${encoded}">Remove</button>` : "—"}</td></tr>`;
      }).join("");
      domainsTable.innerHTML = `${hdr}<tbody>${rows || `<tr><td style="font-weight:600; color:#666; background:#fafafa;">(none)</td><td>—</td></tr>`}</tbody>`;
    }

    async function loadUsers() {
      setMsg("Loading users…", false);
      const data = await api("/users", { method: "GET" });
      renderUsers(data.users || []);
      setMsg(`Loaded ${data.users ? data.users.length : 0} users.`, false);
    }

    async function loadInvites() {
      setInvitesMsg("Loading invites…", false);
      const data = await api("/invites", { method: "GET" });
      renderInvites(data.invites || []);
      setInvitesMsg(`Loaded ${data.invites ? data.invites.length : 0} pending invites.`, false);
    }

    async function loadDomains() {
      setDomainsMsg("Loading domains…", false);
      const data = await api("/allowed-domains", { method: "GET" });
      renderDomains(data.domains || []);
      setDomainsMsg(`Loaded ${(data.domains || []).length} domains.`, false);
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      ta.style.top = "0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }

    invitesTable.addEventListener("click", async (e) => {
      const btn = e.target.closest("button[data-invite-email]");
      if (!btn) return;
      const email = decodeURIComponent(btn.getAttribute("data-invite-email") || "");
      if (!email) return;
      btn.disabled = true;
      setInvitesMsg("Generating invite link…", false);
      try {
        const data = await api("/invites/link", { method: "POST", body: JSON.stringify({ email }) });
        await copyText(data.resetLink);
        setInvitesMsg(`Invite link copied for ${data.email}.`, false);
      } catch (err) {
        setInvitesMsg(String(err && err.message ? err.message : err), true);
      } finally {
        btn.disabled = false;
      }
    });

    domainsTable.addEventListener("click", async (e) => {
      const btn = e.target.closest("button[data-domain]");
      if (!btn) return;
      const domain = decodeURIComponent(btn.getAttribute("data-domain") || "");
      if (!domain) return;
      if (!confirm(`Remove allowed domain "${domain}"?`)) return;
      btn.disabled = true;
      setDomainsMsg("Removing domain…", false);
      try {
        await api(`/allowed-domains/${encodeURIComponent(domain)}`, { method: "DELETE" });
        setDomainsMsg(`Removed ${domain}.`, false);
        await loadDomains();
      } catch (err) {
        setDomainsMsg(String(err && err.message ? err.message : err), true);
      } finally {
        btn.disabled = false;
      }
    });

    usersTable.addEventListener("click", async (e) => {
      const btn = e.target.closest("button[data-uid]");
      if (!btn) return;
      const uid = btn.getAttribute("data-uid");
      if (!uid) return;
      if (!confirm("Delete this user?")) return;
      btn.disabled = true;
      setMsg("Deleting user…", false);
      try {
        await api(`/users/${encodeURIComponent(uid)}`, { method: "DELETE" });
        setMsg("User deleted.", false);
        await loadUsers();
        await loadInvites();
      } catch (err) {
        setMsg(String(err && err.message ? err.message : err), true);
      } finally {
        btn.disabled = false;
      }
    });

    onAuthStateChanged(auth, (user) => {
      (async () => {
        if (!user) {
          window.location.href = "index.html";
          return;
        }

        const userEmail = String(user.email || "").toLowerCase();
        const allowedEmails = ALLOWED_EMAILS.map(e => String(e || "").trim().toLowerCase()).filter(Boolean);
        let allowedDomains = [];
        let domainsLoaded = false;
        try {
          const cfg = await fetchAllowedDomains();
          allowedDomains = cfg.domains;
          domainsLoaded = true;
        } catch (_) {
          domainsLoaded = false;
          allowedDomains = [];
        }

        if (!domainsLoaded && allowedEmails.length === 0) {
          await signOut(auth);
          window.location.href = "index.html";
          return;
        }

        if (!isAllowed(userEmail, allowedEmails, allowedDomains)) {
          await signOut(auth);
          window.location.href = "index.html";
          return;
        }

        if (!ADMIN_EMAILS.has(userEmail)) {
          window.location.href = "tool.html";
          return;
        }

        document.getElementById("navUser").textContent = user.email;
        document.body.classList.remove("loading");
        loadUsers().catch(e => setMsg(String(e && e.message ? e.message : e), true));
        loadInvites().catch(e => setInvitesMsg(String(e && e.message ? e.message : e), true));
        loadDomains().catch(e => setDomainsMsg(String(e && e.message ? e.message : e), true));
      })().catch(() => {
        signOut(auth).then(() => (window.location.href = "index.html"));
      });
    });

    document.getElementById("btnSignOut").addEventListener("click", () => {
      signOut(auth).then(() => window.location.href = "index.html");
    });

    btnInvite.addEventListener("click", async () => {
      const email = inviteEmail.value.trim();
      if (!email) { setMsg("Enter an email address first.", true); return; }
      btnInvite.disabled = true;
      setMsg("Sending invite…", false);
      try {
        const data = await api("/invite", { method: "POST", body: JSON.stringify({ email }) });
        const invitedEmail = (data && data.email ? String(data.email) : email).trim();

        try {
          await sendPasswordResetEmail(auth, invitedEmail);
          setMsg(`Invite sent to ${invitedEmail}.`, false);
        } catch (err) {
          if (data && data.resetLink) {
            const detail = err && err.code ? `${err.code}` : (err && err.message ? err.message : String(err));
            setMsg(`Could not send email automatically (${detail}). Copy this invite link and send it to ${invitedEmail}: ${data.resetLink}`, true);
          } else {
            throw err;
          }
        }
        inviteEmail.value = "";
        await loadUsers();
        await loadInvites();
      } catch (e) {
        setMsg(String(e && e.message ? e.message : e), true);
      } finally {
        btnInvite.disabled = false;
      }
    });

    btnAddDomain.addEventListener("click", async () => {
      const domain = domainInput.value.trim();
      if (!domain) { setDomainsMsg("Enter a domain first.", true); return; }
      btnAddDomain.disabled = true;
      setDomainsMsg("Adding domain…", false);
      try {
        await api("/allowed-domains", { method: "POST", body: JSON.stringify({ domain }) });
        setDomainsMsg(`Added ${domain}.`, false);
        domainInput.value = "";
        await loadDomains();
      } catch (e) {
        setDomainsMsg(String(e && e.message ? e.message : e), true);
      } finally {
        btnAddDomain.disabled = false;
      }
    });
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("/service-worker.js"));
    }
  </script>
</body>
</html>
